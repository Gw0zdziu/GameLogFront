events{}
http{
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  map $http_accept_language $accept_language {
          ~*^en en;
          ~*^pl pl;
      }

  map $http_referer $app_language {
      ~*/en/ en;
      ~*/pl/ pl;
      default pl;
  }

  server{
    listen 80;
    server_name localhost;

    if ($accept_language ~ "^$") {
            set $accept_language "pl";
        }

    location /en/ {
      alias /usr/share/nginx/html/en/;
      try_files $uri $uri/ /en/index.html;
    }

    location /pl/ {
      alias /usr/share/nginx/html/pl/;
      try_files $uri $uri/ /pl/index.html;
    }


    set $first_language $http_accept_language;
        if ($http_accept_language ~* '^(.+?),') {
          set $first_language $1;
        }

        set $language_suffix 'pl';
        if ($first_language ~* 'en') {
          set $language_suffix 'en';
        }

    location /api/ {
      proxy_pass http://backend:8080;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Accept-Language $app_language;
      proxy_pass_header Set-Cookie;


      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'http://localhost' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Content-Length' 0;
        return 204;
      }

      add_header 'Access-Control-Allow-Origin' 'http://localhost' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
    }



    location / {
      return 302 /$language_suffix/index.html;
    }
  }
}
