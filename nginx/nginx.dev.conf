events{}
http{
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server{
    listen 80;
    server_name http://localhost:80;

    location /en/ {
      alias  /usr/share/nginx/html/en/;
      try_files $uri $uri/ /en/index.html;
    }

    location /pl/ {
        alias  /usr/share/nginx/html/pl/;
        try_files $uri $uri/ /pl/index.html;
    }

    location /api/ {
             proxy_pass http://localhost:8080;

             # Przepuszczanie cookies - KLUCZOWE dla refreshToken
             proxy_set_header Cookie $http_cookie;
             proxy_pass_header Set-Cookie;

             # Przepuść nagłówek Authorization
             proxy_set_header Authorization $http_authorization;
             proxy_pass_header Authorization;

             # Inne przydatne nagłówki
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_set_header X-Forwarded-Host $host;
             proxy_set_header Origin "";
    }

    set $first_language $http_accept_language;
        if ($http_accept_language ~* '^(.+?),') {
            set $first_language $1;
        }

        set $language_suffix 'pl';
        if ($first_language ~* 'pl') {
            set $language_suffix 'pl';
        }
        if ($first_language ~* 'en') {
            set $language_suffix 'en';
        }

        location / {
            rewrite ^/$ http://localhost:80/$language_suffix/index.html;
        }
  }

}
