<form #newCategoryForm='ngForm' class="form" (ngSubmit)="submitForm(newCategoryForm)">
  <section class="form__field">
    <label for="categoryName" i18n>Nazwa</label>
    <input #categoryName="ngModel" id="categoryName" minlength="3" name="categoryName" ngModel pInputText pSize="large" required type="text">
    @if (categoryName.invalid && categoryName.touched) {
      @if (categoryName.errors?.required) {
        <p-message i18n severity="error" size="small" variant="simple">Pole jest wymagane</p-message>
      }
      @if (categoryName.errors?.minlength) {
        <p-message i18n severity="error" size="small" variant="simple">Pole musi zawierać co najmniej 3 znaków</p-message>
      }
    }
  </section>
  <section class="form__field">
    <label for="description" i18n>Opis</label>
    <textarea fluid id="description" name="description" ngModel pTextarea></textarea>
  </section>
  <button class="form__button" pButton type="submit" >
    @if (store.isLoading()) {
      <fa-icon animation="spin" [icon]="faSpinner" />
    }
    <span i18n pButtonLabel>{{store.isLoading() ? 'Tworzenie' : 'Dodaj'}}</span>
  </button>
</form>
