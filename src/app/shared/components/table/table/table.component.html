@if (loading()) {
  <p-progress-spinner class="loader" />
} @else {
  <p-table [columns]="columns()" [value]="tableData()">
    <ng-template #header let-columns>
      <tr>
        @for (column of columns; track $index) {
          <th>{{ column.header }}</th>
        }
      </tr>
    </ng-template>
    <ng-template #body let-columns="columns" let-rowData>
      <tr>
        @for (column of columns; track $index) {
          @if(column.field){
            <td class="cell">{{ rowData[column.field] }}</td>
          } @else if (column.columnType === 'action'){
            <td class="actions cell">
              @for (action of column.actions; track $index) {
                <p-button [ariaLabel]="action.label" [icon]="action.icon" [size]="'small'" (click)="action.action(rowData)"/>
              }
            </td>
          }
        }
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td class="table-empty-message" colspan="100%">{{emptyMessage()}}</td>
      </tr>
    </ng-template>
  </p-table>


}
